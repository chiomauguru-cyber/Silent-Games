<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Assistant For Class</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏫</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            500: '#10b981',
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-[#0a0a0a] text-zinc-100 font-sans selection:bg-emerald-500/30;
            }
        }
        .resource-card:hover img {
            @apply opacity-100;
        }
        .resource-card:hover h3 {
            @apply text-emerald-400;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-white/5">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div id="logo" class="flex items-center gap-2 cursor-pointer group">
                        <div class="p-2 bg-[#2e7d32] rounded-lg group-hover:scale-110 transition-transform border-2 border-[#fbc02d]">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        </div>
                        <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent">
                            NEXUS<span class="text-emerald-500">ASSISTANT</span>
                        </h1>
                    </div>

                    <div class="hidden md:flex items-center gap-6 ml-8">
                        <button id="nav-resources" class="text-emerald-500 font-medium hover:text-emerald-400 transition-colors">Resources</button>
                        <button id="nav-dashboard" class="text-zinc-400 font-medium hover:text-white transition-colors">Dashboard</button>
                    </div>

                    <div class="hidden md:flex flex-1 max-w-md mx-8">
                        <div class="relative w-full">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <input
                                id="search-input"
                                type="text"
                                placeholder="Search resources..."
                                class="w-full bg-zinc-900 border border-white/10 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all"
                            >
                        </div>
                    </div>

                    <div class="flex items-center gap-4">
                        <a href="#" class="text-zinc-400 hover:text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Dashboard View -->
            <div id="dashboard-view" class="hidden space-y-8">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Left Column: Assignments -->
                    <div class="lg:col-span-2 space-y-6">
                        <section class="bg-zinc-900/50 border border-white/5 rounded-2xl p-6">
                            <div class="flex items-center justify-between mb-6">
                                <h2 class="text-xl font-bold flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                                    Upcoming Assignments
                                </h2>
                            </div>
                            <div id="assignments-list" class="space-y-4">
                                <!-- Assignments injected here -->
                            </div>
                        </section>

                        <section class="bg-zinc-900/50 border border-white/5 rounded-2xl p-6">
                            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                                Announcements
                            </h2>
                            <div id="announcements-list" class="space-y-4">
                                <!-- Announcements injected here -->
                            </div>
                        </section>
                    </div>

                    <!-- Right Column: Grades -->
                    <div class="space-y-6">
                        <section class="bg-zinc-900/50 border border-white/5 rounded-2xl p-6">
                            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                Current Grades
                            </h2>
                            <div id="grades-list" class="space-y-4">
                                <!-- Grades injected here -->
                            </div>
                        </section>
                    </div>
                </div>
            </div>

            <div id="browse-view" class="space-y-8">
                <!-- Category Filter -->
                <div id="category-filters" class="flex flex-wrap gap-2">
                    <!-- Categories will be injected here -->
                </div>

                <!-- Mobile Search -->
                <div class="md:hidden relative w-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input
                        id="mobile-search-input"
                        type="text"
                        placeholder="Search resources..."
                        class="w-full bg-zinc-900 border border-white/10 rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50"
                    >
                </div>

                <!-- Resources Grid -->
                <div id="resources-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">
                    <!-- Resources will be injected here -->
                </div>

                <div id="no-results" class="hidden text-center py-20">
                    <p class="text-zinc-500 italic">No resources found matching your search.</p>
                </div>
            </div>

            <div id="viewer-view" class="hidden flex flex-col h-[calc(100vh-12rem)]">
                <div class="flex items-center justify-between mb-4">
                    <button id="back-button" class="flex items-center gap-2 text-zinc-400 hover:text-white transition-colors group">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:-translate-x-1 transition-transform"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        <span>Back to Resources</span>
                    </button>
                    <div class="flex items-center gap-4">
                        <h2 id="resource-title" class="text-lg font-bold text-emerald-500 hidden sm:block"></h2>
                        <div class="flex items-center gap-2">
                            <button id="fullscreen-button" class="p-2 bg-zinc-900 rounded-lg hover:bg-zinc-800 transition-colors" title="Fullscreen">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                            </button>
                            <button id="close-button" class="p-2 bg-zinc-900 rounded-lg hover:bg-zinc-800 transition-colors text-red-500">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex-1 bg-black rounded-2xl overflow-hidden border border-white/10 shadow-2xl relative flex items-center justify-center group/viewer">
                    <!-- Start Screen Overlay -->
                    <div id="start-screen" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-zinc-950/90 backdrop-blur-sm transition-opacity duration-500">
                        <div class="relative w-48 h-48 mb-6 rounded-2xl overflow-hidden border-2 border-emerald-500/30 shadow-2xl shadow-emerald-500/20">
                            <img id="start-thumbnail" src="" alt="" class="w-full h-full object-cover" referrerpolicy="no-referrer">
                            <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-transparent to-transparent"></div>
                        </div>
                        <h3 id="start-title" class="text-3xl font-bold text-white mb-2"></h3>
                        <p id="start-category" class="text-emerald-500 uppercase tracking-widest text-xs font-bold mb-8"></p>
                        <button id="start-game-btn" class="px-12 py-4 bg-emerald-500 hover:bg-emerald-400 text-black font-bold rounded-full transition-all transform hover:scale-105 active:scale-95 flex items-center gap-3 shadow-xl shadow-emerald-500/20">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            PLAY NOW
                        </button>
                        <p class="mt-6 text-zinc-500 text-xs italic">Native Game Player Mode Active</p>
                    </div>

                    <!-- Loading Spinner -->
                    <div id="loading-spinner" class="absolute inset-0 z-0 flex items-center justify-center bg-zinc-950 hidden">
                        <div class="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
                    </div>

                    <iframe id="resource-iframe" class="w-full h-full border-none opacity-0 transition-opacity duration-700" allow="autoplay; fullscreen; pointer-lock" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock"></iframe>
                </div>
                
                <div class="mt-4 flex items-center justify-between text-xs text-zinc-500">
                    <div class="flex items-center gap-4">
                        <p>Playing: <span id="playing-title" class="text-zinc-300"></span></p>
                        <p>Category: <span id="playing-category" class="text-zinc-300"></span></p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        <span class="text-emerald-500/80 uppercase font-bold tracking-tighter">Native Mode</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="border-t border-white/5 py-8 mt-12">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-zinc-500 text-sm">
                    &copy; <span id="year"></span> Nexus Assistant For Class.
                </p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
