<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Unblocked Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            500: '#10b981',
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-[#0a0a0a] text-zinc-100 font-sans selection:bg-emerald-500/30;
            }
        }
        .game-card:hover img {
            @apply opacity-100;
        }
        .game-card:hover h3 {
            @apply text-emerald-400;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-white/5">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div id="logo" class="flex items-center gap-2 cursor-pointer group">
                        <div class="p-2 bg-emerald-500 rounded-lg group-hover:scale-110 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-black"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>
                        </div>
                        <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent">
                            NEXUS<span class="text-emerald-500">GAMES</span>
                        </h1>
                    </div>

                    <div class="hidden md:flex flex-1 max-w-md mx-8">
                        <div class="relative w-full">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <input
                                id="search-input"
                                type="text"
                                placeholder="Search games..."
                                class="w-full bg-zinc-900 border border-white/10 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all"
                            >
                        </div>
                    </div>

                    <div class="flex items-center gap-4">
                        <a href="#" class="text-zinc-400 hover:text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div id="browse-view" class="space-y-8">
                <!-- Category Filter -->
                <div id="category-filters" class="flex flex-wrap gap-2">
                    <!-- Categories will be injected here -->
                </div>

                <!-- Mobile Search -->
                <div class="md:hidden relative w-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input
                        id="mobile-search-input"
                        type="text"
                        placeholder="Search games..."
                        class="w-full bg-zinc-900 border border-white/10 rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50"
                    >
                </div>

                <!-- Games Grid -->
                <div id="games-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">
                    <!-- Games will be injected here -->
                </div>

                <div id="no-results" class="hidden text-center py-20">
                    <p class="text-zinc-500 italic">No games found matching your search.</p>
                </div>
            </div>

            <div id="player-view" class="hidden flex flex-col h-[calc(100vh-12rem)]">
                <div class="flex items-center justify-between mb-4">
                    <button id="back-button" class="flex items-center gap-2 text-zinc-400 hover:text-white transition-colors group">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:-translate-x-1 transition-transform"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        <span>Back to Games</span>
                    </button>
                    <div class="flex items-center gap-4">
                        <h2 id="game-title" class="text-lg font-bold text-emerald-500 hidden sm:block"></h2>
                        <div class="flex items-center gap-2">
                            <button id="fullscreen-button" class="p-2 bg-zinc-900 rounded-lg hover:bg-zinc-800 transition-colors" title="Fullscreen">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                            </button>
                            <button id="close-button" class="p-2 bg-zinc-900 rounded-lg hover:bg-zinc-800 transition-colors text-red-500">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex-1 bg-black rounded-2xl overflow-hidden border border-white/10 shadow-2xl relative flex items-center justify-center">
                    <iframe id="game-iframe" class="w-full h-full border-none" allow="autoplay; fullscreen; pointer-lock"></iframe>
                    <canvas id="game-canvas" class="hidden max-w-full max-h-full"></canvas>
                    <div id="internal-game-ui" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/80 z-10 p-6 text-center">
                        <h2 id="internal-status" class="text-4xl font-bold text-emerald-500 mb-6">CAR CHASE</h2>
                        
                        <div id="setup-controls" class="space-y-4 w-full max-w-xs">
                            <div class="space-y-1 text-left">
                                <label class="text-xs text-zinc-500 uppercase font-bold">Username</label>
                                <input id="player-name-input" type="text" placeholder="Enter name..." class="w-full bg-zinc-900 border border-white/10 rounded-lg py-2 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50">
                            </div>
                            
                            <div class="space-y-1 text-left">
                                <label class="text-xs text-zinc-500 uppercase font-bold">Game Duration (Minutes)</label>
                                <select id="game-duration-select" class="w-full bg-zinc-900 border border-white/10 rounded-lg py-2 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50">
                                    <option value="2">2 Minutes</option>
                                    <option value="3">3 Minutes</option>
                                    <option value="5">5 Minutes</option>
                                    <option value="10">10 Minutes</option>
                                </select>
                            </div>

                            <button id="start-internal-btn" class="w-full mt-4 px-8 py-3 bg-emerald-500 text-black font-bold rounded-full hover:scale-105 transition-transform">START GAME</button>
                        </div>
                        
                        <p class="mt-6 text-zinc-500 text-sm">WASD/Arrows to move • Space to attack</p>
                    </div>

                    <!-- Game HUD -->
                    <div id="game-hud" class="hidden absolute top-4 right-4 flex flex-col items-end space-y-2 pointer-events-none z-20">
                        <button id="upgrade-btn" class="pointer-events-auto px-4 py-2 bg-emerald-500 text-black font-bold rounded-lg transition-all shadow-lg">
                            UPGRADE ($200)
                        </button>
                    </div>
                </div>
                
                <div class="mt-4 flex items-center justify-between text-xs text-zinc-500">
                    <p>Playing: <span id="playing-title" class="text-zinc-300"></span></p>
                    <p>Category: <span id="playing-category" class="text-zinc-300"></span></p>
                </div>
            </div>
        </main>

        <footer class="border-t border-white/5 py-8 mt-12">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-zinc-500 text-sm">
                    &copy; <span id="year"></span> Nexus Unblocked Games. All games are property of their respective owners.
                </p>
            </div>
        </footer>
    </div>

    <script src="snake.js"></script>
    <script src="car-chase.js"></script>
    <script src="script.js"></script>
</body>
</html>
